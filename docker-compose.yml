services:

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-container
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - tor

  tor:
    build:
      context: ./tor
      dockerfile: Dockerfile
    container_name: tor-container
    ports:
      - "4243:4242"
    volumes:
      - ./tor/torrc:/etc/tor/torrc:ro
